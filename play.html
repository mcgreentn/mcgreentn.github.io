  <style>
    :root {
      --bg: #0c1017;
      --text: #dde6f0;
      --muted: #7a8fa3;
      --link: #7ab8f5;
      --link-hover: #b0d4ff;
    }

    body {
      font-family: 'Arvo', serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-top: 56px;
      padding-bottom: 56px;
    }

    /* ── Nav ── */
    .site-nav {
      background-color: var(--bg);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .site-nav .container {
      max-width: 760px;
    }

    .site-nav .navbar-brand {
      font-family: 'JetBrains Mono', sans-serif;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .site-nav .nav-link {
      font-family: 'JetBrains Mono', sans-serif;
      font-size: 0.92rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 0.4rem 0.75rem;
      transition: color 150ms ease;
    }

    .site-nav .nav-link:hover,
    .site-nav .nav-link.active {
      color: var(--text);
    }

    /* ── Page ── */
    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 64px 24px 48px;
    }

    .page-title {
      font-family: 'JetBrains Mono', sans-serif;
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      font-weight: 700;
      line-height: 1.1;
      margin: 0 0 48px;
      letter-spacing: 0.02em;
    }

    /* ── Cartridge shelf ── */
    .cart-shelf {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      align-items: flex-start;
    }

    /* ── Cartridge ── */
    .cartridge {
      width: 190px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }

    .cart-body {
      background: linear-gradient(170deg, #2c2c40 0%, #1e1e2c 100%);
      /* SNES-style: two notch cutouts at top corners */
      clip-path: polygon(
        0% 22px,
        22px 22px,
        22px 0%,
        calc(100% - 22px) 0%,
        calc(100% - 22px) 22px,
        100% 22px,
        100% 100%,
        0% 100%
      );
      padding: 26px 14px 14px;
      position: relative;
      box-shadow:
        0 2px 0 rgba(255,255,255,0.06) inset,
        0 12px 32px rgba(0,0,0,0.6),
        0 2px 8px rgba(0,0,0,0.4);
      transition: transform 220ms cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 220ms ease;
    }

    .cartridge:hover .cart-body {
      transform: translateY(-10px) rotate(-1deg);
      box-shadow:
        0 2px 0 rgba(255,255,255,0.08) inset,
        0 24px 48px rgba(0,0,0,0.7),
        0 8px 16px rgba(0,0,0,0.5);
    }

    .cartridge:active .cart-body {
      transform: translateY(-4px) rotate(0deg);
      transition-duration: 80ms;
    }

    /* Raised ridge on body sides */
    .cart-body::before {
      content: '';
      position: absolute;
      top: 30px;
      bottom: 0;
      left: 6px;
      width: 4px;
      background: rgba(255,255,255,0.04);
      border-radius: 2px;
    }

    .cart-body::after {
      content: '';
      position: absolute;
      top: 30px;
      bottom: 0;
      right: 6px;
      width: 4px;
      background: rgba(255,255,255,0.04);
      border-radius: 2px;
    }

    /* ── Label / screenshot area ── */
    .cart-label {
      background: #0d2820;
      border-radius: 6px 6px 4px 4px;
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.4) inset;
    }

    /* Screenshot image — swap src to add a real screenshot */
    .cart-screenshot {
      width: 100%;
      aspect-ratio: 4 / 3;
      display: block;
      object-fit: cover;
    }

    /* Placeholder shown when no screenshot image is provided */
    .cart-screenshot-placeholder {
      width: 100%;
      aspect-ratio: 4 / 3;
      background-color: #0d2820;
      background-image:
        linear-gradient(rgba(72,127,115,0.18) 1px, transparent 1px),
        linear-gradient(90deg, rgba(72,127,115,0.18) 1px, transparent 1px);
      background-size: 14px 14px;
      position: relative;
      overflow: hidden;
    }

    /* Little dungeon room shapes in the placeholder */
    .cart-screenshot-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(ellipse 40px 28px at 30% 35%, rgba(72,127,115,0.22) 0%, transparent 70%),
        radial-gradient(ellipse 32px 24px at 70% 65%, rgba(72,127,115,0.20) 0%, transparent 70%),
        radial-gradient(ellipse 22px 18px at 55% 25%, rgba(72,127,115,0.16) 0%, transparent 70%);
    }

    /* "@" symbol like a player character */
    .cart-screenshot-placeholder::after {
      content: '@';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.6rem;
      color: rgba(122,200,170,0.55);
      text-shadow: 0 0 12px rgba(122,200,170,0.4);
    }

    /* ── Title strip on the label ── */
    .cart-label-title {
      background: linear-gradient(90deg, #1a3a2e, #142e24);
      padding: 7px 10px 6px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .cart-game-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #a8dcc8;
      text-transform: uppercase;
    }

    .cart-game-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      color: rgba(122,187,160,0.5);
      text-transform: uppercase;
    }

    /* ── Connector (bottom) ── */
    .cart-connector {
      background: #141420;
      border-radius: 0 0 6px 6px;
      height: 22px;
      display: flex;
      align-items: flex-end;
      padding: 0 18px 4px;
      gap: 4px;
    }

    .cart-pin {
      flex: 1;
      height: 13px;
      background: linear-gradient(to bottom, #c8a84a, #8c6e28);
      border-radius: 1px 1px 2px 2px;
      max-width: 10px;
    }

    /* ── Boot overlay ── */
    .boot-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0;
      pointer-events: none;
      visibility: hidden;
    }

    .boot-overlay.active {
      visibility: visible;
      pointer-events: all;
    }

    /* CRT power-on: horizontal scan line that expands */
    .boot-crt-line {
      position: absolute;
      left: 0; right: 0;
      height: 100%;
      background: #000;
      transform: scaleY(0.003);
      transform-origin: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.9),
        0 0 24px 4px rgba(255,255,255,0.5),
        0 0 80px 16px rgba(255,255,255,0.15);
      animation: none;
    }

    .boot-overlay.active .boot-crt-line {
      animation: crtExpand 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes crtExpand {
      0%   { transform: scaleY(0.003); }
      60%  { transform: scaleY(1.04); }
      100% { transform: scaleY(1); box-shadow: none; }
    }

    /* Content revealed after CRT expands */
    .boot-content {
      position: relative;
      z-index: 1;
      text-align: center;
      opacity: 0;
      /* scanlines over the boot screen */
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.18) 2px,
        rgba(0,0,0,0.18) 4px
      );
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }

    .boot-overlay.active .boot-content {
      animation: bootReveal 0.2s ease 0.38s forwards;
    }

    @keyframes bootReveal {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .boot-game-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(2.4rem, 8vw, 4rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      color: #a8dcc8;
      text-shadow:
        0 0 20px rgba(168,220,200,0.8),
        0 0 60px rgba(168,220,200,0.3);
      animation: none;
    }

    .boot-overlay.active .boot-game-title {
      animation: titleFlicker 0.4s steps(1) 0.5s both;
    }

    @keyframes titleFlicker {
      0%   { opacity: 0; }
      25%  { opacity: 1; }
      40%  { opacity: 0; }
      60%  { opacity: 1; }
      75%  { opacity: 0; }
      100% { opacity: 1; }
    }

    .boot-loading-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      color: rgba(168,220,200,0.6);
      text-transform: uppercase;
      opacity: 0;
    }

    .boot-overlay.active .boot-loading-row {
      animation: bootReveal 0.1s ease 1s forwards;
    }

    .boot-dots span {
      animation: dotBlink 0.6s steps(1) infinite;
      opacity: 0;
    }
    .boot-dots span:nth-child(2) { animation-delay: 0.2s; }
    .boot-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBlink {
      50% { opacity: 1; }
    }

    .boot-bar-wrap {
      width: 180px;
      height: 6px;
      background: rgba(168,220,200,0.12);
      border-radius: 3px;
      overflow: hidden;
      opacity: 0;
    }

    .boot-overlay.active .boot-bar-wrap {
      animation: bootReveal 0.1s ease 1.05s forwards;
    }

    .boot-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4a9e80, #a8dcc8);
      border-radius: 3px;
      box-shadow: 0 0 8px rgba(168,220,200,0.6);
    }

    .boot-overlay.active .boot-bar-fill {
      animation: barFill 0.7s cubic-bezier(0.4, 0, 0.2, 1) 1.1s forwards;
    }

    @keyframes barFill {
      to { width: 100%; }
    }

    /* ── AI Clicker placeholder ── */
    .aic-placeholder {
      background-color: #0a1a1a;
      background-image:
        linear-gradient(rgba(126,212,164,0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(126,212,164,0.12) 1px, transparent 1px);
      background-size: 18px 18px;
    }

    /* Neural network node clusters */
    .aic-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle 3px at 20% 30%, rgba(126,212,164,0.7) 0%, transparent 100%),
        radial-gradient(circle 3px at 50% 30%, rgba(126,212,164,0.7) 0%, transparent 100%),
        radial-gradient(circle 3px at 80% 30%, rgba(126,212,164,0.7) 0%, transparent 100%),
        radial-gradient(circle 3px at 30% 60%, rgba(122,184,245,0.7) 0%, transparent 100%),
        radial-gradient(circle 3px at 65% 60%, rgba(122,184,245,0.7) 0%, transparent 100%),
        radial-gradient(circle 3px at 50% 80%, rgba(201,168,245,0.8) 0%, transparent 100%),
        radial-gradient(ellipse 60px 1px at 35% 45%, rgba(126,212,164,0.25) 0%, transparent 100%),
        radial-gradient(ellipse 60px 1px at 58% 45%, rgba(126,212,164,0.25) 0%, transparent 100%),
        radial-gradient(ellipse 50px 1px at 40% 70%, rgba(122,184,245,0.2) 0%, transparent 100%),
        radial-gradient(ellipse 50px 1px at 57% 70%, rgba(122,184,245,0.2) 0%, transparent 100%);
    }

    /* Text label */
    .aic-placeholder::after {
      content: '0→∞';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: rgba(126,212,164,0.5);
      text-shadow: 0 0 10px rgba(126,212,164,0.4);
      letter-spacing: 0.1em;
    }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 24px;
      font-family: 'JetBrains Mono', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      color: rgba(122, 143, 163, 0.35);
      border-top: 1px solid rgba(255,255,255,0.04);
      background-color: var(--bg);
    }
  </style>
</head>

  <script>
    function bootGame(url, title) {
      const overlay = document.getElementById('boot-overlay');
      document.getElementById('boot-title').textContent = title;

      overlay.classList.add('active');

      // Navigate after the boot animation completes (~1.9s)
      setTimeout(function() {
        window.location.href = url;
      }, 1900);
    }
  </script>
