<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Media — Michael Cerny Green">
  <title>Media — Michael Cerny Green</title>

  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="font-awesome/css/font-awesome.min.css" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Arvo&display=swap" rel="stylesheet">

  <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
  <link rel="icon" href="images/favicon.ico" type="image/x-icon">

  <script async src="https://www.googletagmanager.com/gtag/js?id=UA-54297010-6"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'UA-54297010-6');
  </script>

  <style>
    :root {
      --bg: #0c1017;
      --text: #dde6f0;
      --muted: #7a8fa3;
      --link: #7ab8f5;
      --link-hover: #b0d4ff;
    }

    body {
      font-family: 'Arvo', serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-top: 56px;
      padding-bottom: 56px;
    }

    /* ── Nav ── */
    .site-nav {
      background-color: var(--bg);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .site-nav .container {
      max-width: 760px;
    }

    .site-nav .navbar-brand {
      font-family: 'JetBrains Mono', sans-serif;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .site-nav .nav-link {
      font-family: 'JetBrains Mono', sans-serif;
      font-size: 0.92rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 0.4rem 0.75rem;
      transition: color 150ms ease;
    }

    .site-nav .nav-link:hover,
    .site-nav .nav-link.active {
      color: var(--text);
    }

    .site-nav .navbar-toggler {
      border-color: var(--muted);
      padding: 0.3rem 0.6rem;
    }
    .site-nav .navbar-toggler:focus { box-shadow: none; }
    .site-nav .navbar-toggler-icon {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(122,143,163,1)' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
      width: 1.2em;
      height: 1.2em;
    }
    @media (max-width: 575.98px) {
      .site-nav .navbar-toggler { display: flex; align-items: center; gap: 7px; }
    }

    /* ── Page ── */
    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 64px 24px 48px;
    }

    .page-title {
      font-family: 'JetBrains Mono', sans-serif;
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      font-weight: 700;
      line-height: 1.1;
      margin: 0 0 48px;
      letter-spacing: 0.02em;
    }

    .section-title {
      font-family: 'JetBrains Mono', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* ── Media entries ── */
    .media-item {
      margin-bottom: 16px;
    }

    .media-item a {
      color: var(--link);
      font-size: 0.95rem;
      line-height: 1.5;
      text-decoration: none;
      transition: color 150ms ease;
    }

    .media-item a:hover {
      color: var(--link-hover);
      text-decoration: underline;
    }

    .media-item .media-meta {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .media-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.05);
      margin: 0 0 24px;
    }

    .section-gap {
      margin-top: 48px;
    }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 24px;
      font-family: 'JetBrains Mono', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      color: rgba(122, 143, 163, 0.35);
      border-top: 1px solid rgba(255,255,255,0.04);
      background-color: var(--bg);
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-sm fixed-top site-nav">
    <div class="container">
      <a class="navbar-brand" href="index.html">Michael Cerny Green</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#siteNav"
        aria-controls="siteNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="siteNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="index.html">about</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="play.html">play</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="research.html">research</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="media.html">media</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="blog.html">blog</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="projects.html">projects</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="papers/Current.pdf" target="_blank">cv</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main>
    <div class="page">
      <h1 class="page-title">Media</h1>

      <p class="section-title">Publications</p>
      <div id="pubcontainer"></div>

      <div class="section-gap">
        <p class="section-title">Interviews &amp; Videos</p>
        <div id="medcontainer"></div>
      </div>
    </div>
  </main>

  <footer>
    &copy; 2026 Michael Cerny Green
  </footer>

  <script src="js/jquery.js"></script>
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="assets/media.js"></script>
  <script>
    $(document).ready(function () {
      var pubcontainer = $('#pubcontainer');
      $.each(data.publications, function (index, item) {
        var entry =
          '<div class="media-item">' +
            '<a href="' + item.link + '" target="_blank">[' + item.year + '] ' + item.title + '</a>' +
            '<div class="media-meta">' + item.author + ' &middot; ' + item.publication + '</div>' +
          '</div>' +
          (index < data.publications.length - 1 ? '<hr class="media-divider">' : '');
        pubcontainer.append(entry);
      });

      var medcontainer = $('#medcontainer');
      $.each(data.media, function (index, item) {
        var entry =
          '<div class="media-item">' +
            '<a href="' + item.link + '" target="_blank">[' + item.year + '] ' + item.title + '</a>' +
            '<div class="media-meta">' + item.author + ' &middot; ' + item.publication + '</div>' +
          '</div>' +
          (index < data.media.length - 1 ? '<hr class="media-divider">' : '');
        medcontainer.append(entry);
      });
    });
  </script>
</body>

</html>
