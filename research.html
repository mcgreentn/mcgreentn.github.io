<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Research — Michael Cerny Green">
  <title>Research — Michael Cerny Green</title>

  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="font-awesome/css/font-awesome.min.css" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Arvo&display=swap" rel="stylesheet">

  <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
  <link rel="icon" href="images/favicon.ico" type="image/x-icon">

  <script async src="https://www.googletagmanager.com/gtag/js?id=UA-54297010-6"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'UA-54297010-6');
  </script>

  <style>
    :root {
      --bg: #0c1017;
      --text: #dde6f0;
      --muted: #7a8fa3;
      --link: #7ab8f5;
      --link-hover: #b0d4ff;
    }

    body {
      font-family: 'Arvo', serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-top: 56px;
      padding-bottom: 56px;
    }

    /* ── Nav ── */
    .site-nav {
      background-color: var(--bg);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .site-nav .container {
      max-width: 760px;
    }

    .site-nav .navbar-brand {
      font-family: 'JetBrains Mono', sans-serif;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .site-nav .nav-link {
      font-family: 'JetBrains Mono', sans-serif;
      font-size: 0.92rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 0.4rem 0.75rem;
      transition: color 150ms ease;
    }

    .site-nav .nav-link:hover,
    .site-nav .nav-link.active {
      color: var(--text);
    }

    /* ── Page ── */
    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 64px 24px 48px;
    }

    .page-title {
      font-family: 'JetBrains Mono', sans-serif;
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      font-weight: 700;
      line-height: 1.1;
      margin: 0 0 12px;
      letter-spacing: 0.02em;
    }

    .page-meta {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 48px;
    }

    /* ── Paper entries ── */
    .paper {
      margin-bottom: 16px;
    }

    .paper-title {
      font-family: 'JetBrains Mono', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }

    .paper-year {
      color: var(--muted);
      font-size: 0.85rem;
      margin-right: 6px;
    }

    .paper-authors {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .paper-venue {
      font-size: 0.88rem;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 6px;
    }

    .paper-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
    }

    .paper-links a {
      color: var(--link);
      font-family: 'JetBrains Mono', sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      text-decoration: none;
      transition: color 150ms ease;
      white-space: nowrap;
    }

    .paper-links a:hover {
      color: var(--link-hover);
      text-decoration: underline;
    }

    .paper-sep {
      color: rgba(255,255,255,0.15);
      margin: 0 8px;
      font-family: 'JetBrains Mono', sans-serif;
      font-size: 0.82rem;
    }

    .paper-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.05);
      margin: 0 0 24px;
    }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 24px;
      font-family: 'JetBrains Mono', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      color: rgba(122, 143, 163, 0.35);
      border-top: 1px solid rgba(255,255,255,0.04);
      background-color: var(--bg);
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-sm fixed-top site-nav">
    <div class="container">
      <a class="navbar-brand" href="index.html">Michael Cerny Green</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#siteNav"
        aria-controls="siteNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="siteNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="index.html">about</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="research.html">research</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="media.html">media</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="blog.html">blog</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="projects.html">projects</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="papers/Current.pdf" target="_blank">cv</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main>
    <div class="page">
      <h1 class="page-title">Published Work</h1>
      <p class="page-meta">
        <span id="research-count"></span> total papers —
        <span id="journal-count"></span> journal,
        <span id="conference-count"></span> conference,
        <span id="workshop-count"></span> workshop,
        <span id="unpublished-count"></span> unpublished,
        <span id="thesis-count"></span> thesis,
        in reverse chronological order.
        Some have demos and code. A few even have blog posts.
      </p>

      <div id="researchcontainer"></div>
    </div>
  </main>

  <footer>
    &copy; 2026 Michael Cerny Green
  </footer>

  <script src="js/jquery.js"></script>
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="assets/research.js"></script>
  <script>
    $(document).ready(function () {
      var myResearch = data.papers;
      var researchContainer = $('#researchcontainer');
      var counts = { journal: 0, conference: 0, workshop: 0, unpublished: 0, thesis: 0, total: 0 };

      $.each(myResearch, function (index, item) {
        var links = '<a href="' + item.link + '" target="_blank">pdf</a>';
        if (item.blog)    links += '<span class="paper-sep">/</span><a href="' + item.blog  + '" target="_blank">blog</a>';
        if (item.code)    links += '<span class="paper-sep">/</span><a href="' + item.code  + '" target="_blank">code</a>';
        if (item.demo)    links += '<span class="paper-sep">/</span><a href="' + item.demo  + '" target="_blank">demo</a>';
        if (item.video)   links += '<span class="paper-sep">/</span><a href="' + item.video + '" target="_blank">video</a>';
        if (item.slides)  links += '<span class="paper-sep">/</span><a href="' + item.slides + '" target="_blank">slides</a>';
        if (item.poster)  links += '<span class="paper-sep">/</span><a href="' + item.poster + '" target="_blank">poster</a>';

        var paper =
          '<div class="paper">' +
            '<div class="paper-title"><span class="paper-year">[' + item.year + ']</span>' + item.title + '</div>' +
            '<div class="paper-authors">' + item.authors + '</div>' +
            '<div class="paper-venue">' + item.conference + '</div>' +
            '<div class="paper-links">' + links + '</div>' +
          '</div>' +
          (index < myResearch.length - 1 ? '<hr class="paper-divider">' : '');

        researchContainer.append(paper);
        counts.total++;
        if (counts[item.tier] !== undefined) counts[item.tier]++;
      });

      $('#research-count').text(counts.total);
      $('#journal-count').text(counts.journal);
      $('#conference-count').text(counts.conference);
      $('#workshop-count').text(counts.workshop);
      $('#unpublished-count').text(counts.unpublished);
      $('#thesis-count').text(counts.thesis);
    });
  </script>
</body>

</html>
